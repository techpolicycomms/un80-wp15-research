name: Validate data and build dashboard

on:
  push:
    branches: [main]
    paths:
      - "data/**"
      - "scripts/**"
      - "dashboard/**"
      - "package.json"
  pull_request:
    paths:
      - "data/**"
      - "scripts/**"
      - "dashboard/**"
      - "package.json"

jobs:
  validate-and-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - run: npm ci
      - run: npm run validate
      - run: npm run build:dashboard

      - uses: actions/upload-artifact@v4
        with:
          name: dashboard-dist
          path: dashboard/dist/

  deploy-pages:
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: validate-and-build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - run: npm ci
      - run: npm run build:dashboard

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dashboard/dist

      - id: deployment
        uses: actions/deploy-pages@v4
