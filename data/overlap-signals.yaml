# Signals of duplication and interoperability gaps (populated by automations)
meta:
  last_updated: "2026-06-22"
  disclaimer: Working document — public secondary evidence only

signals:
  - id: sig-2026-05-22-001
    topic: parallel_cloud_and_workplace_contracts
    summary: >-
      ICC shared service catalog coexists with entity-level ICT spend >$2B,
      indicating practical consolidation opportunity where shared providers can
      scale common cloud and workplace services (Action 61).
    evidence_sources:
      - data/ict-spend-baseline.json
      - data/secondary-sources/2026-05-22-scan.yaml
    confidence: medium

  - id: sig-2026-05-23-002
    topic: uniqcloud_shared_private_cloud_maturity
    summary: >-
      UNICC UNIQCloud (2025) provides OpenStack private cloud from UN data centres
      with Management Committee pricing — demonstrates actionable consolidation path
      for sensitive workloads alongside public/hybrid cloud strategies (Action 61).
    evidence_sources:
      - data/secondary-sources/2026-05-23-first-iteration-scan.yaml
    confidence: high

  - id: sig-2026-05-23-003
    topic: odet_system_digital_focal_point
    summary: >-
      ODET (Jan 2025) centralizes UN system digital coordination (AI, DPI, open
      source) — governance layer that consolidation (61) and TAP (62) must align
      with to avoid parallel digital steering structures.
    evidence_sources:
      - data/secondary-sources/2026-05-23-first-iteration-scan.yaml
    confidence: medium

  - id: sig-2026-06-15-008
    topic: ceb_shared_technology_services_interoperability
    summary: >-
      Public CEB/HLCM materials explicitly identify technology-service
      fragmentation and propose integrated ICT procurement, shared software
      services, One UN IT/data-centre consolidation, unified digital identity and
      ERP-as-a-Service as common-service responses. This is clear duplication and
      interoperability evidence for aligning Action 61 provider consolidation
      with Action 62 TAP solution portfolios.
    evidence_sources:
      - data/secondary-sources/2026-06-15-scan.yaml
    confidence: high

  - id: sig-2026-06-22-009
    topic: shared_services_default_duplication_test
    summary: >-
      The public Secretary-General UN80 progress report calls for system-wide
      shared services and critical common enablers, notably technology and data,
      to become the default where they improve quality, efficiency, transparency
      and delivery. It explicitly asks entities to support interoperability and
      data governance and to justify duplication where shared approaches would
      appear better placed to deliver value.
    evidence_sources:
      - data/secondary-sources/2026-06-22-scan.yaml
    confidence: high

  - id: sig-2026-06-22-010
    topic: p3_icc_software_procurement_coherence
    summary: >-
      Public HLCM Procurement Network material links P3 joint software licensing
      with ICC shared-service activity, noting potential synergies between P3
      aggregated-demand negotiations and ICC software-license resale/digital
      services. This is clear consolidation evidence for avoiding parallel
      software-procurement channels and preserving coherence between Action 61
      provider consolidation and ICC delivery.
    evidence_sources:
      - data/secondary-sources/2026-06-22-scan.yaml
    confidence: high

  - id: sig-2026-06-22-011
    topic: secretariat_digital_reuse_interoperability_gap
    summary: >-
      The public OIOS evaluation reports that many Secretariat digital tools were
      highly customized, lacked interoperability, and could not be scaled or
      reused across the Secretariat. This creates direct design evidence for
      Action 61 shared-platform consolidation and Action 62 TAP portfolio
      governance to prioritize reusable components over entity-specific builds.
    evidence_sources:
      - data/secondary-sources/2026-06-22-scan.yaml
    confidence: high
