  - source:
      title: Session Report
      url: https://unsceb.org/session-report-426
      type: un_system
    relevance: action_61
    topic: dtn_shared_services_duplication_controls
    summary: >-
      The public CEB Digital and Technology Network session report says CIOs
      discussed operational efficiency, digital transformation, inter-agency
      collaboration, cost optimization, enhanced cybersecurity, shared services
      and emerging technologies. It explicitly states that plenary discussions
      were guided by preventing monopolies, promoting healthy competition and
      eliminating duplication, making it direct public governance evidence for
      Action 61 ICT consolidation design.
    confidence: high

  - source:
      title: UN working group launches new AI resource hub
      url: https://www.itu.int/hub/2025/12/un-working-group-launches-new-ai-resource-hub/
      type: un_system
    relevance: action_62
    topic: ai_resource_hub_portfolio_coordination
    summary: >-
      ITU's public launch article describes the UN AI Resource Hub as a unique,
      centralized, searchable gateway for AI-related activities across the UN
      system. It says the hub brings together more than 750 AI initiatives from
      over 50 UN entities, was developed by UNDP, ITU and UNESCO under the UN
      Interagency Working Group on AI, and supports discoverability, alignment,
      coordination, programmatic coherence, shared priorities and synergies.
      This is direct public evidence for TAP-style demand discovery and
      portfolio coordination for AI solutions.
    confidence: high

  - source:
      title: UN 2.0 Data & Digital Community | UN AI Expo
      url: https://www.uninnovation.network/innovation-library/un-2-0-data-digital-community-un-ai-expo
      type: un_system
    relevance: action_62
    topic: ai_resource_hub_innovation_pipeline
    summary: >-
      The UN Innovation Network library entry says the UN AI Resource Hub,
      developed by UNDP, ITU and UNESCO, is a centralized space to strengthen
      UN-wide AI capacity-building and coordination. It enables leadership and
      stakeholders to discover and align AI-related activities, avoid
      duplication and maintain a living repository of inter-agency connections
      and UN AI efforts, making it a public pipeline and matchmaking analogue
      for TAP.
    confidence: high

  - source:
      title: AI Sandbox
      url: https://www.unicc.org/ai-sandbox-as-a-service/
      type: un_system
    relevance: both
    topic: shared_ai_sandbox_reuse_interoperability
    summary: >-
      UNICC describes the AI Sandbox as a UNICC AI Hub service for moving AI
      pilots to production across the UN system through secure experimentation
      and deployment environments. The page explicitly says the sandbox supports
      reuse of high-quality datasets and pre-trained AI models, fosters
      interoperability, reduces duplication of effort and enables seamless
      cross-organization collaboration, linking Action 61 shared infrastructure
      with Action 62 AI portfolio acceleration.
    confidence: high

  - source:
      title: UNICC AI Hub Launch
      url: https://www.unicc.org/unicc-ai-hub-launch/
      type: un_system
    relevance: action_62
    topic: ai_hub_shared_operating_model
    summary: >-
      UNICC's public AI Hub launch page frames the Hub as a central platform
      for AI innovation, governance and collaboration in the UN system. It
      presents the Hub's operating model and strategic value as a shared
      resource for governance, innovation and capacity building, with flagship
      tracks and working groups intended to co-create shared, affordable and
      scalable AI solutions.
    confidence: medium

  - source:
      title: "From Total Cost of Ownership to Social Impact: A Frugal AI Framework to Measure Your AI Portfolio as a Strategic Asset"
      url: https://www.uninnovation.network/innovation-library/from-total-cost-of-ownership-to-social-impact-a-frugal-ai-framework-to-measure-your-ai-portfolio-as-a-strategic-asset
      type: un_system
    relevance: action_62
    topic: ai_portfolio_value_framework
    summary: >-
      The UN Innovation Network entry describes a standardized framework
      developed by the Frugal AI Hub at the University of Cambridge and UNICC to
      measure AI value at model and portfolio level. It states that AI portfolio
      assessment remains fragmented and proposes metrics for total cost of
      ownership, return on investment and SDG-aligned social impact, providing a
      public portfolio-triage reference for TAP governance of shared AI
      investments.
    confidence: medium

  - source:
      title: "UNify HR: An interagency GenAI Solution for HR"
      url: https://www.uninnovation.network/innovation-library/unify-hr-an-interagency-genai-solution-for-hr
      type: un_system
    relevance: action_62
    topic: interagency_genai_shared_repository
    summary: >-
      The UN Innovation Network page describes UNify HR as an AI-driven chatbot
      for HR policy inquiries across 13 UN organizations, developed by UNHCR and
      UNICC. It uses a shared repository of HR documents and policies, supports
      comparison across organizations and is framed as inter-agency AI
      collaboration, making it concrete public evidence for reusable AI
      solutions and expertise-sharing patterns relevant to TAP.
    confidence: medium
